## Comment out when doing local development
backend:
  name: github
  repo: OSC-OCIO/osc.gov
  base_url: https://pages.cloud.gov
  auth_endpoint: external/auth/github
  preview_context: pages/build
  branch: main
  use_graphql: true

##
## Uncomment when doing local development on Netlify CMS
## Run `npx netlify-cms-proxy-server` to start working locally
## In another terminal, start the app with `npm start`
## See https://www.netlifycms.org/docs/beta-features/#working-with-a-local-git-repository
##

# backend:
#   name: git-gateway
# local_backend: true

media_folder: img
public_folder: /img
publish_mode: editorial_workflow
logo_url: https://pages.cloud.gov/images/logos/pages-logo-blue.svg
site_url: https://www.osc.gov

editor:
  preview: false

cms_editable_filter: &cms_editable_filter
  filter:
    field: "cms_editable"
    value: true

page_fields: &page_fields
  - {
      label: "CMS Editable",
      name: "cms_editable",
      widget: "hidden",
      default: true,
    }
  - {
      label: "Title",
      name: "title",
      widget: "string",
      hint: "The main heading people see at the top of the page.",
    }
  - {
      label: "Lead Text",
      name: "lead",
      widget: "markdown",
      minimal: true,
      hint: "Optional intro text shown under the page title.",
      required: false,
    }
  - {
      label: "Body",
      name: "body",
      widget: "markdown",
      hint: "Main content for this page.",
      required: false,
    }
  - label: "FAQs"
    name: "faqs"
    widget: "list"
    required: false
    collapsed: true
    hint: "Used on pages with the `layouts/faq-accordion` template. Add either a simple FAQ (Question + Answer) or a section (Section Heading + Items)."
    summary: "{{fields.heading}}{{fields.question}}"
    fields:
      - {
          label: "Section Heading",
          name: "heading",
          widget: "string",
          hint: "Optional. Add this when you want to group FAQs in a section.",
          required: false,
        }
      - {
          label: "Question",
          name: "question",
          widget: "string",
          hint: "Use this for a simple FAQ item (no section items).",
          required: false,
        }
      - {
          label: "Answer",
          name: "answer",
          widget: "text",
          hint: "Use this for a simple FAQ item (no section items).",
          required: false,
        }
      - label: "Items"
        name: "items"
        widget: "list"
        required: false
        collapsed: true
        hint: "Add the question-and-answer items for this section."
        summary: "{{fields.question}}"
        fields:
          - { label: "Question", name: "question", widget: "string" }
          - { label: "Answer", name: "answer", widget: "text" }
  - label: "Link List"
    name: "items"
    widget: "list"
    required: false
    collapsed: true
    hint: "Used on pages with the `layouts/resource-index` template. Add either a simple list of items (Section Heading + Items) or organize content into subsections (Section Heading + Subsections)."
    summary: "{{fields.heading}}"
    fields:
      - {
          label: "Section Heading",
          name: "heading",
          widget: "string",
          required: false,
          hint: "Optional. Add this when you want to group links in a section.",
        }
      - label: "Items"
        name: "links"
        widget: "list"
        required: false
        collapsed: true
        summary: "{{fields.name}}"
        hint: "Use this for a simple link section (no subsection items)."
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
          - {
              label: "Icon",
              name: "icon",
              widget: "string",
              required: false,
              hint: "Optional USWDS icon name. Leave blank to use `file_present`.",
            }
      - label: "Subsections"
        name: "sections"
        widget: "list"
        required: false
        collapsed: true
        summary: "{{fields.heading}}"
        hint: "Use this when you want to group links into subsections."
        fields:
          - {
              label: "Subsection Heading",
              name: "heading",
              widget: "string",
              hint: "Add a short heading to group links in this subsection.",
            }
          - label: "Items"
            name: "links"
            widget: "list"
            required: false
            collapsed: true
            summary: "{{fields.name}}"
            hint: "Add the links for this subsection."
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - {
                  label: "Icon",
                  name: "icon",
                  widget: "string",
                  required: false,
                  hint: "Optional USWDS icon name. Leave blank to use `file_present`.",
                }
  - {
      label: "Footnote",
      name: "footnote",
      widget: "markdown",
      minimal: true,
      hint: "Shown only on pages using the `layouts/resource-index` template.",
      required: false,
    }

collections:
  - name: "about-pages"
    label: "About Pages"
    files:
      - label: "About OSC"
        name: "about-osc-page"
        file: "pages/about/about.md"
        preview_path: "about/about"
        fields: *page_fields
      - label: "Engagement"
        name: "engagement-page"
        file: "pages/about/engagement.md"
        preview_path: "about/engagement"
        fields: *page_fields
      - label: "Law Clerk Program"
        name: "lawclerk-page"
        file: "pages/about/lawclerk.md"
        preview_path: "about/lawclerk"
        fields: *page_fields
      - label: "Opportunities"
        name: "opportunities-page"
        file: "pages/about/opportunities.md"
        preview_path: "about/opportunities"
        fields: *page_fields
  - name: "about-foia-pages"
    label: "About Pages - FOIA"
    folder: "pages/about/foia"
    preview_path: "about/foia/{{slug}}"
    create: false
    <<: *cms_editable_filter
    identifier_field: "title"
    summary: "{{title}}"
    fields: *page_fields
  - name: "about-policies-pages"
    label: "About Pages - Policies"
    folder: "pages/about/policies"
    preview_path: "about/policies/{{slug}}"
    create: false
    <<: *cms_editable_filter
    identifier_field: "title"
    summary: "{{title}}"
    fields: *page_fields
  - name: "about-privacy-pages"
    label: "About Pages - Privacy"
    folder: "pages/about/privacy"
    preview_path: "about/privacy/{{slug}}"
    create: false
    <<: *cms_editable_filter
    identifier_field: "title"
    summary: "{{title}}"
    fields: *page_fields
  - name: "case"
    label: "Cases"
    label_singular: "Case"
    folder: "collections/case"
    create: true
    slug: "{{cases[0]}}{{cases[1] | ternary('--multi', '')}}"
    preview_path: "cases"
    summary: "{{cases[0]}}{{cases[1] | ternary(' + additional cases', '')}}"
    sortable_fields:
      - { field: "date", default_sort: "desc", label: "Date (Newest first)" }
    fields:
      - label: "Source"
        name: "source"
        widget: "object"
        fields:
          - {
              label: "Agency",
              name: "agency",
              widget: "select",
              multiple: false,
              options:
                [
                  "Agriculture",
                  "Customs and Border Protection",
                  "Defense/Air Force",
                  "Defense/Army",
                  "Defense/Navy",
                  "Department of Defense",
                  "Education",
                  "Energy",
                  "Environmental Protection Agency",
                  "Federal Aviation Administration",
                  "General Services Administration",
                  "Health and Human Services",
                  "Homeland Security",
                  "Housing and Urban Development",
                  "Interior",
                  "Justice",
                  "Labor",
                  "Naval Supply Systems Command",
                  "Other/Independent Agency",
                  "Selective Service System",
                  "Social Security Administration",
                  "State",
                  "Transportation",
                  "Treasury",
                  "U.S. Air Force",
                  "U.S. Army",
                  "U.S. Navy",
                  "Veterans Affairs",
                ],
            }
          - {
              label: "Subagency",
              name: "subagency",
              widget: "select",
              multiple: false,
              required: false,
              options:
                [
                  "Agricultural Research Service",
                  "Assistant Secretary for Human Resources Management",
                  "Bureau of Alcohol, Tobacco, Firearms, and Explosives",
                  "Bureau of Land Management",
                  "Bureau of Prisons/Federal Prison System",
                  "Bureau of Safety and Environmental Enforcement",
                  "Centers for Medicare and Medicaid Services",
                  "Customs and Border Protection",
                  "Defense Health Agency",
                  "Department of Defense",
                  "Drug Enforcement Administration",
                  "Federal Aviation Administration",
                  "Federal Bureau of Investigation",
                  "Federal Emergency Management Agency",
                  "Federal Railroad Administration",
                  "Federal Student Aid",
                  "Forest Service",
                  "Homeland Security",
                  "Immigration and Customs Enforcement",
                  "Internal Revenue Service",
                  "Mine Safety and Health Administration",
                  "Office of the Chief Financial Officer",
                  "Office of the Inspector General",
                  "Office of the Under Secretary",
                  "Transportation",
                  "Transportation Security Administration",
                  "U.S. Army",
                  "U.S. Army Aviation and Missile Command",
                  "U.S. Marshals Service",
                  "U.S. Navy",
                  "Veterans Health Administration",
                ],
            }
      - label: "Case(s)"
        name: "cases"
        widget: "list"
        allow_add: true
        summary: "{{fields.case}}"
        field: { label: Case Number, name: case, widget: string }
      - label: "Location(s)"
        name: "locations"
        widget: "list"
        allow_add: true
        summary: "{{fields.location}}"
        field: { label: "Location", name: location, widget: string }
      - label: "Result(s)"
        name: "results"
        widget: "select"
        multiple: true
        options:
          [
            "Agency takes systemic corrective action after OSC invovlement",
            "Changes in agency rules, regulations, policy or practices",
            "Cost savings to the government and/or accountability",
            "Disciplinary action against any employee",
            "Improved health and/or safety",
            "Partially substantiated",
            "Referral of criminal matter to the Attorney General",
            "Special Counsel found report not reasonable",
            "Substantiated",
            "Totally unsubstantiated",
            "Unsubstantiated but led to agency changes",
            "Other actions",
          ]
      - {
          label: "Date Closed",
          name: "date",
          date_format: "YYYY-MM-DD",
          widget: "datetime",
        }
      - label: "File(s)"
        name: "files"
        widget: "list"
        summary: "{{fields.label}}"
        fields:
          - { label: Label, name: label, widget: string }
          - { label: Link, name: href, widget: string }
  - name: "contacts"
    label: "Contacts"
    files:
      - label: "Contact Directory"
        name: "contacts-data"
        file: "_data/contacts.yaml"
        fields:
          - label: "Units"
            name: "units"
            widget: "list"
            required: false
            collapsed: true
            summary: "{{fields.name}}"
            fields:
              - { label: "Unit Name", name: "name", widget: "string" }
              - {
                  label: "Phone 1",
                  name: "phone1",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "Phone 2",
                  name: "phone2",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "Phone 3",
                  name: "phone3",
                  widget: "string",
                  required: false,
                }
              - { label: "Fax", name: "fax", widget: "string", required: false }
              - {
                  label: "Email",
                  name: "email",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "Address",
                  name: "address",
                  widget: "string",
                  required: false,
                }
  - name: "core-pages"
    label: "Core Pages"
    <<: *cms_editable_filter
    files:
      - label: "Public Files"
        name: "cases-page"
        file: "pages/cases.md"
        preview_path: "cases"
        fields: *page_fields
      - label: Home
        name: "home"
        file: "pages/index.md"
        preview_path: "/"
        fields:
          - label: Hero Section
            name: hero
            widget: object
            required: false
            fields:
              - { label: Header, name: header, widget: string }
              - { label: Body, name: body, widget: string }
              - label: "Button 1 (Left)"
                name: "button_left"
                widget: "object"
                required: false
                fields:
                  - { label: Text, name: text, widget: string }
                  - { label: Link, name: link, widget: string }
              - label: "Button 2 (Right)"
                name: "button_right"
                widget: "object"
                required: false
                fields:
                  - { label: Text, name: text, widget: string }
                  - { label: Link, name: link, widget: string }
              - label: "Hero Image"
                name: "hero_image"
                widget: "object"
                required: false
                fields:
                  - { label: Image, name: image, widget: image }
                  - { label: "Alt text", name: "alt_text", widget: "string" }
          - label: Agency Highlights
            name: highlights
            widget: list
            min: 3
            max: 3
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt text", name: "alt", widget: "string" }
              - { label: "Button Text", name: "cta_text", widget: "string" }
              - { label: "Button Link", name: "cta_url", widget: "string" }
          - label: Featured Video
            name: video
            widget: object
            fields:
              - { label: Header, name: header, widget: string }
              - { label: Video Title, name: title, widget: string }
              - { label: "Body", name: "body", widget: "string" }
              - { label: "Video Link", name: "url", widget: "string" }
              - { label: "Button Text", name: "button_text", widget: "string" }
              - { label: "Button Link", name: "button_url", widget: "string" }
  - name: "file-complaint-pages"
    label: "File Complaint Pages"
    folder: "pages/file-complaint"
    preview_path: "file-complaint/{{slug}}"
    create: false
    <<: *cms_editable_filter
    identifier_field: "title"
    summary: "{{title}}"
    fields: *page_fields
  - name: "press-release"
    label_singular: "Press Release"
    label: "Press Release"
    folder: "collections/press-release"
    create: true
    slug: "{{date}}-{{slug}}"
    preview_path: "news/{{year}}-{{month}}-{{day}}/{{slug}}"
    preview_path_date_field: "date"
    summary: "[{{date}}] {{title}}"
    sortable_fields:
      - { field: "date", default_sort: "desc", label: "Date (Newest first)" }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Date",
          name: "date",
          date_format: "YYYY-MM-DD",
          default: "{{now}}",
          widget: "datetime",
        }
      - { label: "Body", name: "body", widget: "markdown" }
      - {
          label: "Tags",
          name: "tags",
          widget: "select",
          multiple: true,
          options:
            [
              {
                label: "Alternative Dispute Resolution",
                value: "alternative dispute resolution",
              },
              {
                label: "Disclosure of Wrongdoing",
                value: "disclosure of wrongdoing",
              },
              { label: "General", value: "general" },
              { label: "Hatch Act", value: "hatch act" },
              { label: "Outreach Training", value: "outreach training" },
              {
                label: "Prohibited Personnel Practices",
                value: "prohibited personnel practices",
              },
              { label: "USERRA", value: "userra" },
            ],
        }
  - name: "resource-pages"
    label: "Resource Pages"
    folder: "pages/resources"
    preview_path: "resources/{{slug}}"
    create: false
    <<: *cms_editable_filter
    identifier_field: "title"
    summary: "{{title}}"
    fields: *page_fields
  - name: "services-alternative-dispute-resolution-pages"
    label: "Services Pages - Alternative Dispute Resolution"
    folder: "pages/services/alternative-dispute-resolution"
    preview_path: "services/alternative-dispute-resolution/{{slug}}"
    create: false
    <<: *cms_editable_filter
    identifier_field: "title"
    summary: "{{title}}"
    fields: *page_fields
  - name: "services-disclosure-of-wrongdoing-pages"
    label: "Services Pages - Disclosure of Wrongdoing"
    folder: "pages/services/disclosure-of-wrongdoing"
    preview_path: "services/disclosure-of-wrongdoing/{{slug}}"
    create: false
    <<: *cms_editable_filter
    identifier_field: "title"
    summary: "{{title}}"
    fields: *page_fields
  - name: "services-hatch-act-pages"
    label: "Services Pages - Hatch Act"
    folder: "pages/services/hatch-act"
    preview_path: "services/hatch-act/{{slug}}"
    create: false
    <<: *cms_editable_filter
    identifier_field: "title"
    summary: "{{title}}"
    fields: *page_fields
  - name: "services-outreach-pages"
    label: "Services Pages - Outreach"
    folder: "pages/services/outreach"
    preview_path: "services/outreach/{{slug}}"
    create: false
    <<: *cms_editable_filter
    identifier_field: "title"
    summary: "{{title}}"
    fields: *page_fields
  - name: "services-prohibited-personnel-practices-pages"
    label: "Services Pages - Prohibited Personnel Practices"
    folder: "pages/services/prohibited-personnel-practices"
    preview_path: "services/prohibited-personnel-practices/{{slug}}"
    create: false
    <<: *cms_editable_filter
    identifier_field: "title"
    summary: "{{title}}"
    fields: *page_fields
  - name: "services-userra-pages"
    label: "Services Pages - USERRA"
    folder: "pages/services/userra"
    preview_path: "services/userra/{{slug}}"
    create: false
    <<: *cms_editable_filter
    identifier_field: "title"
    summary: "{{title}}"
    fields: *page_fields
