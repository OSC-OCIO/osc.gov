##
## Uncomment when doing local development on Netlify CMS
## Run `npx netlify-cms-proxy-server` to start working locally
## In another terminal, start the app with `npm start`
## See https://www.netlifycms.org/docs/beta-features/#working-with-a-local-git-repository
##

backend:
  name: git-gateway
local_backend: true

media_folder: img
public_folder: /img
publish_mode: editorial_workflow
logo_url: https://pages.cloud.gov/images/logos/pages-logo-blue.svg

editor:
  preview: false

collections:
  - name: "case"
    label: "Case"
    folder: "collections/case"
    create: true
    editor:
      preview: false
    slug: "{{cases}}"
    summary: "{{cases}}"
    fields:
      - label: "Source"
        name: "source"
        widget: "object"
        fields:
          - { label: "Agency", name: "agency", widget: "string" }
          - { label: "Subagency", name: "subagency", widget: "string" }
      - label: "Case(s)"
        name: "cases"
        widget: "list"
        allow_add: true
        summary: "{{fields.case}}"
        field: { label: Case Number, name: case, widget: string }
      - label: "Location(s)"
        name: "locations"
        widget: "list"
        allow_add: true
        summary: "{{fields.location}}"
        field: { label: "Location", name: location, widget: string }
      - label: "Result(s)"
        name: "results"
        widget: "select"
        multiple: true
        options:
          [
            "Substantiated",
            "Partially substantiated",
            "Totally unsubstantiated",
            "Unsubstantiated but led to agency changes",
            "Changes in agency rules, regulations, policy or practices",
            "Improved health and/or safety",
            "Disciplinary action against any employee",
            "Cost savings to the government and/or accountability",
            "Special Counsel found report not reasonable",
            "Referral of criminal matter to the Attorney General",
            "Agency takes systemic corrective action after OSC invovlement",
            "Other actions",
          ]
      - {
          label: "Date Closed",
          name: "date",
          date_format: "YYYY-MM-DD",
          widget: "datetime",
        }
      - label: "File(s)"
        name: "files"
        widget: "list"
        summary: "{{fields.label}}"
        fields:
          - { label: Label, name: label, widget: string }
          - { label: href, name: href, widget: string }
  - name: "press-release"
    label: "Press Release"
    folder: "collections/press-release"
    create: true
    editor:
      preview: false
    slug: "{{date}}-{{slug}}"
    summary: "[{{date}}] {{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Date",
          name: "date",
          date_format: "YYYY-MM-DD",
          default: "{{now}}",
          widget: "datetime",
        }
      - { label: "Body", name: "body", widget: "markdown" }
      - {
          label: "Tags",
          name: "tags",
          widget: "select",
          multiple: true,
          options:
            [
              "hatch act",
              "prohibited personnel practices",
              "disclosure of wrongdoing",
              "general",
              "userra",
              "outreach training",
              "alternative dispute resolution",
            ],
        }
